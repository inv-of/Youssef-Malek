<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دعوة زفاف يوسف و ملاك</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

.section{
    width:100%;
    height:100vh;
}

.section img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
}

/* أنيميشن الظهور */
.fade-section{
    opacity:0;
    transform:translateY(50px);
    transition:1s ease;
}

.fade-section.show{
    opacity:1;
    transform:translateY(0);
}

.location-section{
    position:relative;
    width:100%;
    height:100vh;

    background:url("section3.png") center center no-repeat;
    background-size:cover;

    display:flex;
    justify-content:center;
    align-items:center;

    overflow:hidden;
}



.location-box{
    position:relative;
    z-index:2;

    width:80%;
    max-width:800px;

    margin:auto;
    transform:translateY(-50px);

    display:flex;
    justify-content:center; /* يوسّط الـ iframe */
}

.location-box h2{
    margin-bottom:20px;
    color:#fff;
    font-size:40px;
    letter-spacing:2px;
}

.location-box iframe{
    width:80%;
    height:185px;

    border:none;
    border-radius:20px;
    box-shadow:0 20px 40px rgba(0,0,0,.3);
}

/* Animation */
.fade-section{
    opacity:0;
    transform:translateY(60px);
    transition:1s ease;
}

.fade-section.show{
    opacity:1;
    transform:translateY(0);
}
</style>
</head>
<body>

<!-- السكشن الأول -->
<section class="section">
    <img src="section1.png" alt="">
</section>

<!-- السكشن الثاني -->
<section class="section fade-section" id="second">
    <img src="section2.png" alt="">
</section>

<!-- السكشن الأخير -->
<section class="location-section">

    <div class="location-box">
        
        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3277.2771807789095!2d10.715314099999999!3d34.7737968!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x1301d319115f9d47%3A0x345ca47087a2d170!2sL&#39;Opera%20Palace!5e0!3m2!1sen!2seg!4v1782485979574!5m2!1sen!2seg" 
        width="600" 
        height="450" 
        style="border:0;" 
        allowfullscreen="" 
        loading="lazy" 
        referrerpolicy="strict-origin-when-cross-origin">
    </iframe>

    </div>

</section>
<script>
const secondSection = document.querySelector('.fade-section');

const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
        if(entry.isIntersecting){
            entry.target.classList.add('show');
        }
    });
},{
    threshold:0.2
});

observer.observe(secondSection);
</script>

</body>
</html>
